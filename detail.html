<!doctype html>
<html lang="fr" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>FarmsConnect - Détail Capteur</title>

    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icon.svg" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="css/app.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              green: { 500: "#22c55e", 600: "#16a34a" },
              slate: {
                50: "#f8fafc",
                100: "#f1f5f9",
                200: "#e2e8f0",
                400: "#94a3b8",
                500: "#64748b",
                800: "#1e293b",
              },
              brand: { green: "#16a34a" },
            },
            fontFamily: { sans: ["Nunito", "sans-serif"] },
          },
        },
      };
    </script>
  </head>
  <body class="flex flex-col h-[100dvh] overflow-hidden bg-[#fafbfd]">
    <main class="flex-1 overflow-y-auto px-4 pb-24 pt-safe">
      <!-- HEADER -->
      <header class="flex justify-between items-center mt-4 mb-6">
        <a
          href="javascript:history.back()"
          class="w-10 h-10 bg-white card-border rounded-xl flex items-center justify-center text-[#0f2b46]"
        >
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <div class="flex-1 ml-4 relative">
          <h1
            class="text-[17px] font-black text-[#0f2b46] leading-tight flex items-center gap-2"
          >
            Serre 1
          </h1>
          <div class="mt-0.5">
            <span
              class="pill green"
              style="
                padding: 2px 6px;
                font-size: 10px;
                background-color: #dcfce7;
                color: #16a34a;
              "
              ><span
                class="status-dot"
                style="background-color: #16a34a"
              ></span>
              Normal</span
            >
          </div>
        </div>
        <a
          href="reglages.html"
          class="w-10 h-10 bg-white card-border rounded-xl flex items-center justify-center text-slate-400"
        >
          <i data-lucide="settings" class="w-5 h-5"></i>
        </a>
      </header>

      <!-- MAIN SENSOR BLOCK -->
      <div
        class="bg-[#22c55e] rounded-[24px] p-5 text-white mb-6 relative overflow-hidden shadow-sm"
      >
        <div class="flex items-center gap-3 mb-6 relative z-10">
          <div
            class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm"
          >
            <i data-lucide="thermometer" class="w-6 h-6"></i>
          </div>
          <span class="font-bold text-sm opacity-90">Serre 1</span>
        </div>

        <div class="flex items-baseline gap-1 mb-6 relative z-10">
          <span class="text-5xl font-black tracking-tight">23.6</span>
          <span class="text-xl font-bold opacity-80">°C</span>
          <i
            data-lucide="arrow-down"
            class="w-5 h-5 opacity-90 -mb-1 ml-1 text-white"
          ></i>
        </div>

        <!-- Custom Progress styling inside the green block -->
        <div class="w-full h-1.5 bg-white/30 rounded-full mb-2 relative z-10">
          <div class="h-1.5 bg-white rounded-full" style="width: 50%"></div>
        </div>

        <div
          class="flex justify-between text-[10px] font-bold opacity-80 relative z-10"
        >
          <span>Min: 5°C</span>
          <span>Max: 35°C</span>
        </div>
      </div>

      <!-- CHART (SVG) -->
      <div class="card-border p-5 mb-5 rounded-2xl">
        <h3 class="text-xs font-black text-[#0f2b46] mb-4 text-left">
          Historique 7 jours
        </h3>

        <div class="h-28 w-full mt-4 flex flex-col justify-end relative">
          <svg
            viewBox="0 0 100 50"
            class="w-full h-full overflow-visible"
            preserveAspectRatio="none"
          >
            <defs>
              <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3" />
                <stop offset="100%" stop-color="#22c55e" stop-opacity="0" />
              </linearGradient>
            </defs>
            <polygon
              points="10,25 25,18 40,15 55,18 70,10 85,15 100,15 100,50 10,50"
              fill="url(#chartGradient)"
            />
            <polyline
              points="10,25 25,18 40,15 55,18 70,10 85,15 100,15"
              fill="none"
              stroke="#22c55e"
              stroke-width="1.5"
            />
            <circle
              cx="10"
              cy="25"
              r="2"
              fill="white"
              stroke="#22c55e"
              stroke-width="1.5"
            />
            <circle
              cx="25"
              cy="18"
              r="2"
              fill="white"
              stroke="#22c55e"
              stroke-width="1.5"
            />
            <circle
              cx="40"
              cy="15"
              r="2"
              fill="white"
              stroke="#22c55e"
              stroke-width="1.5"
            />
            <circle
              cx="55"
              cy="18"
              r="2"
              fill="white"
              stroke="#22c55e"
              stroke-width="1.5"
            />
            <circle
              cx="70"
              cy="10"
              r="2"
              fill="white"
              stroke="#22c55e"
              stroke-width="1.5"
            />
            <circle
              cx="85"
              cy="15"
              r="2"
              fill="white"
              stroke="#22c55e"
              stroke-width="1.5"
            />
            <circle
              cx="100"
              cy="15"
              r="2"
              fill="white"
              stroke="#22c55e"
              stroke-width="1.5"
            />
          </svg>

          <div
            class="flex justify-between text-[9px] font-bold text-slate-400 mt-2 px-1"
          >
            <span>Lun</span>
            <span>Mar</span>
            <span>Mer</span>
            <span>Jeu</span>
            <span>Ven</span>
            <span>Sam</span>
            <span>Dim</span>
          </div>
        </div>
      </div>

      <!-- SEUILS -->
      <div class="card-border p-5 rounded-2xl">
        <h3 class="text-xs font-black text-[#0f2b46] mb-4 text-left">
          Seuils d'alerte
        </h3>

        <div class="flex gap-4">
          <div class="flex-1 bg-blue-50/50 rounded-xl p-4 text-center">
            <span class="block text-[10px] font-bold text-blue-500 mb-1"
              >Minimum</span
            >
            <span class="block text-2xl font-black text-blue-600">5°C</span>
          </div>
          <div class="flex-1 bg-red-50/50 rounded-xl p-4 text-center">
            <span class="block text-[10px] font-bold text-red-500 mb-1"
              >Maximum</span
            >
            <span class="block text-2xl font-black text-red-600">35°C</span>
          </div>
        </div>
      </div>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="absolute bottom-0 w-full bottom-nav pt-3 pb-safe z-50">
      <ul class="flex justify-around items-center px-2">
        <li>
          <a href="index.html" class="nav-item w-16">
            <div class="p-1.5 flex items-center justify-center">
              <i data-lucide="home" class="w-5 h-5"></i>
            </div>
            <span>Accueil</span>
          </a>
        </li>
        <li>
          <a href="alertes.html" class="nav-item w-16">
            <div class="p-1.5 flex items-center justify-center">
              <i data-lucide="bell" class="w-5 h-5"></i>
            </div>
            <span>Alertes</span>
          </a>
        </li>
        <li>
          <a href="equipements.html" class="nav-item active w-16">
            <div
              class="bg-brand-green-light rounded-xl p-1.5 flex items-center justify-center"
            >
              <i data-lucide="tractor" class="w-5 h-5 text-green-500"></i>
            </div>
            <span>Équipements</span>
          </a>
        </li>
        <li>
          <a href="reglages.html" class="nav-item w-16">
            <div class="p-1.5 flex items-center justify-center">
              <i data-lucide="settings" class="w-5 h-5"></i>
            </div>
            <span>Réglages</span>
          </a>
        </li>
      </ul>
    </nav>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
