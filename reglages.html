<!doctype html>
<html lang="fr" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Ferme Connectée - Réglages</title>

    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icon.svg" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="css/app.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              green: { 500: "#22c55e", 600: "#16a34a" },
              slate: {
                50: "#f8fafc",
                100: "#f1f5f9",
                200: "#e2e8f0",
                400: "#94a3b8",
                500: "#64748b",
                800: "#1e293b",
              },
            },
            fontFamily: { sans: ["Nunito", "sans-serif"] },
          },
        },
      };
    </script>
    <style>
      /* Custom Input Styling */
      input[type="number"] {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 8px 12px;
        font-weight: 700;
        color: #0f2b46;
        outline: none;
        width: 100%;
      }
      input[type="number"]:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
      }
    </style>
  </head>
  <body class="flex flex-col h-[100dvh] overflow-hidden bg-[#fafbfd]">
    <main class="flex-1 overflow-y-auto px-4 pb-24 pt-safe">
      <!-- HEADER -->
      <header class="flex items-center gap-3 mt-4 mb-6">
        <div
          class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-600"
        >
          <i data-lucide="settings" class="w-6 h-6"></i>
        </div>
        <div>
          <h1 class="text-[1.3rem] font-black text-[#0f2b46] leading-tight">
            Réglages
          </h1>
        </div>
      </header>

      <!-- NOTIFICATIONS -->
      <div class="card-border p-4 mb-6">
        <div class="flex items-center gap-2 mb-4">
          <div
            class="w-6 h-6 bg-blue-100 rounded-md flex items-center justify-center text-blue-500"
          >
            <i data-lucide="bell" class="w-3.5 h-3.5"></i>
          </div>
          <h3 class="font-bold text-[#0f2b46] text-sm">Notifications</h3>
        </div>

        <div class="flex justify-between items-center mb-4">
          <div>
            <h4 class="font-bold text-sm text-[#0f2b46]">
              Activer les alertes
            </h4>
            <p class="text-[11px] text-slate-400 font-bold">
              Recevoir les notifications push
            </p>
          </div>
          <!-- Toggle Form (On) -->
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" value="" class="sr-only peer" checked />
            <div
              class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#0f2b46]"
            ></div>
          </label>
        </div>

        <div class="flex justify-between items-center">
          <div>
            <h4 class="font-bold text-sm text-slate-500">
              Critiques uniquement
            </h4>
            <p class="text-[11px] text-slate-400 font-bold">
              Alertes rouges seulement
            </p>
          </div>
          <!-- Toggle Form (Off) -->
          <label
            class="relative inline-flex items-center cursor-pointer opacity-50"
          >
            <input type="checkbox" value="" class="sr-only peer" />
            <div
              class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#0f2b46]"
            ></div>
          </label>
        </div>
      </div>

      <h2
        class="text-xs font-black text-slate-500 mb-3 uppercase tracking-wider px-1"
      >
        SEUILS D'ALERTE
      </h2>

      <!-- FORM: TEMPÉRATURE -->
      <div class="card-border p-4 mb-3">
        <div class="flex items-center gap-2 mb-3">
          <div
            class="w-6 h-6 bg-orange-100 rounded-md flex items-center justify-center text-orange-500"
          >
            <i data-lucide="thermometer" class="w-3.5 h-3.5"></i>
          </div>
          <h3 class="font-bold text-[#0f2b46] text-sm">Température serre</h3>
        </div>

        <div class="flex gap-4">
          <div class="flex-1">
            <label class="block text-[10px] font-bold text-slate-500 mb-1"
              >Min (°C)</label
            >
            <input type="number" value="5" />
          </div>
          <div class="flex-1">
            <label class="block text-[10px] font-bold text-slate-500 mb-1"
              >Max (°C)</label
            >
            <input type="number" value="35" />
          </div>
        </div>
      </div>

      <!-- FORM: HUMIDITÉ -->
      <div class="card-border p-4 mb-3">
        <div class="flex items-center gap-2 mb-3">
          <div
            class="w-6 h-6 bg-blue-100 rounded-md flex items-center justify-center text-blue-500"
          >
            <i data-lucide="droplets" class="w-3.5 h-3.5"></i>
          </div>
          <h3 class="font-bold text-[#0f2b46] text-sm">Humidité sol</h3>
        </div>

        <div class="flex gap-4">
          <div class="flex-1">
            <label class="block text-[10px] font-bold text-slate-500 mb-1"
              >Min (%)</label
            >
            <input type="number" value="30" />
          </div>
          <div class="flex-1">
            <label class="block text-[10px] font-bold text-slate-500 mb-1"
              >Max (%)</label
            >
            <input type="number" value="85" />
          </div>
        </div>
      </div>

      <!-- FORM: RÉSERVOIR -->
      <div class="card-border p-4 mb-3">
        <div class="flex items-center gap-2 mb-3">
          <div
            class="w-6 h-6 bg-cyan-100 rounded-md flex items-center justify-center text-cyan-500"
          >
            <i data-lucide="droplet" class="w-3.5 h-3.5"></i>
          </div>
          <h3 class="font-bold text-[#0f2b46] text-sm">Niveau eau</h3>
        </div>
        <div class="flex gap-4">
          <div class="flex-1">
            <label class="block text-[10px] font-bold text-slate-500 mb-1"
              >Min (%)</label
            >
            <input type="number" value="15" />
          </div>
        </div>
      </div>

      <!-- FORM: BATTERIE -->
      <div class="card-border p-4 mb-6">
        <div class="flex items-center gap-2 mb-3">
          <div
            class="w-6 h-6 bg-green-100 rounded-md flex items-center justify-center text-green-500"
          >
            <i data-lucide="battery-medium" class="w-3.5 h-3.5"></i>
          </div>
          <h3 class="font-bold text-[#0f2b46] text-sm">Batterie capteur</h3>
        </div>
        <div class="flex gap-4">
          <div class="flex-1">
            <label class="block text-[10px] font-bold text-slate-500 mb-1"
              >Min (%)</label
            >
            <input type="number" value="20" />
          </div>
        </div>
      </div>

      <!-- ACTION BUTTONS -->
      <button class="btn-primary mb-3 flex items-center justify-center gap-2">
        <i data-lucide="save" class="w-4 h-4"></i> Enregistrer les réglages
      </button>

      <button
        class="btn-outline text-red-500 border-red-200 bg-red-50 flex items-center justify-center gap-2"
      >
        <i data-lucide="log-out" class="w-4 h-4"></i> Déconnexion
      </button>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="absolute bottom-0 w-full bottom-nav pt-3 pb-safe z-50">
      <ul class="flex justify-around items-center px-2">
        <li>
          <a href="index.html" class="nav-item w-16">
            <div class="p-1.5 flex items-center justify-center">
              <i data-lucide="home" class="w-5 h-5"></i>
            </div>
            <span>Accueil</span>
          </a>
        </li>
        <li>
          <a href="alertes.html" class="nav-item w-16">
            <div class="p-1.5 flex items-center justify-center">
              <i data-lucide="bell" class="w-5 h-5"></i>
            </div>
            <span>Alertes</span>
          </a>
        </li>
        <li>
          <a href="equipements.html" class="nav-item w-16">
            <div class="p-1.5 flex items-center justify-center">
              <i data-lucide="tractor" class="w-5 h-5"></i>
            </div>
            <span>Équipements</span>
          </a>
        </li>
        <li>
          <a href="reglages.html" class="nav-item active w-16">
            <div
              class="bg-brand-green-light rounded-xl p-1.5 flex items-center justify-center"
            >
              <i data-lucide="settings" class="w-5 h-5 text-green-500"></i>
            </div>
            <span>Réglages</span>
          </a>
        </li>
      </ul>
    </nav>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
