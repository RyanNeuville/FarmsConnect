<!doctype html>
<html lang="fr" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Ferme Connectée</title>

    <!-- PWA Meta -->
    <meta
      name="theme-color"
      content="#15803d"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0f172a"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icon.svg" />

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"
    ></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Assets -->
    <link rel="stylesheet" href="css/app.css" />
    <script src="js/app.js"></script>

    <!-- Tailwind Config Customization -->
    <script>
      tailwind.config = {
        darkMode: "media",
        theme: {
          extend: {
            colors: {
              ferme: { DEFAULT: "#15803d", light: "#22c55e", dark: "#14532d" },
              alerte: "#ef4444",
              warning: "#f59e0b",
            },
            fontFamily: { sans: ["Outfit", "sans-serif"] },
          },
        },
      };
    </script>
  </head>
  <body
    x-data="fermeApp()"
    x-init="initApp()"
    class="flex flex-col h-screen overflow-hidden bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 selection:bg-ferme selection:text-white"
    x-effect="lucide.createIcons()"
  >
    <!-- Toast / Notification pop-up -->
    <template x-teleport="body">
      <div
        x-show="toastMessage"
        x-transition:enter="transition ease-out duration-300 transform"
        x-transition:enter-start="opacity-0 -translate-y-4"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-200 transform"
        x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 -translate-y-4"
        class="fixed top-safe mt-4 left-1/2 -translate-x-1/2 bg-slate-800/95 backdrop-blur-sm text-white px-5 py-3 rounded-2xl text-sm font-semibold whitespace-nowrap z-[100] shadow-2xl border border-white/10 flex items-center gap-2"
        x-cloak
      >
        <span x-text="toastMessage"></span>
      </div>
    </template>

    <!-- Offline Banner -->
    <div
      x-show="!isOnline"
      x-cloak
      x-transition
      class="bg-warning text-white text-xs sm:text-sm font-bold pt-safe pb-2 px-4 text-center z-50 flex flex-col items-center justify-center shrink-0 shadow-md"
    >
      <div class="flex items-center gap-2">
        <i data-lucide="wifi-off" class="w-4 h-4"></i>
        <span
          >Mode Hors-Ligne (Dernières données :
          <span x-text="lastSyncTime"></span>)</span
        >
      </div>
    </div>

    <!-- ==================== PAGE : LOGIN ==================== -->
    <main
      x-show="currentPage === 'login'"
      x-transition:leave="transition ease-in duration-300"
      x-transition:leave-start="opacity-100 scale-100"
      x-transition:leave-end="opacity-0 scale-95"
      class="absolute inset-0 z-40 flex flex-col items-center justify-center p-6 h-full w-full animated-bg text-white"
      x-cloak
    >
      <div
        class="mb-8 p-5 bg-white/20 rounded-3xl backdrop-blur-md border border-white/20 shadow-2xl ring-1 ring-white/10"
      >
        <i
          data-lucide="tractor"
          class="w-16 h-16 text-white drop-shadow-md"
        ></i>
      </div>

      <h1 class="text-4xl font-extrabold mb-2 tracking-tight drop-shadow-sm">
        Ferme Connectée
      </h1>
      <p class="text-emerald-100 mb-10 font-medium tracking-wide">
        Votre exploitation, dans votre poche.
      </p>

      <form @submit.prevent="login()" class="w-full max-w-sm space-y-4">
        <div class="relative">
          <i
            data-lucide="mail"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-emerald-800/50"
          ></i>
          <input
            type="email"
            placeholder="agriculteur@domaine.fr"
            class="w-full p-4 pl-12 rounded-2xl border-none bg-white/90 text-slate-800 focus:ring-4 focus:ring-emerald-300/50 focus:bg-white text-lg shadow-inner placeholder-emerald-800/40 transition-all outline-none font-medium"
          />
        </div>
        <div class="relative">
          <i
            data-lucide="lock"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-emerald-800/50"
          ></i>
          <input
            type="password"
            placeholder="••••••••"
            class="w-full p-4 pl-12 rounded-2xl border-none bg-white/90 text-slate-800 focus:ring-4 focus:ring-emerald-300/50 focus:bg-white text-lg shadow-inner placeholder-emerald-800/40 transition-all outline-none font-medium"
            value="password"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl text-lg shadow-xl shadow-black/20 transition-transform active:scale-95 flex items-center justify-center gap-2 mt-6"
        >
          Se connecter
          <i data-lucide="arrow-right" class="w-5 h-5"></i>
        </button>

        <div class="flex gap-3 pt-2">
          <button
            type="button"
            @click="login()"
            class="flex-1 bg-white/20 backdrop-blur text-white border border-white/30 font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-95 flex justify-center items-center"
          >
            <i data-lucide="fingerprint" class="w-6 h-6 drop-shadow-sm"></i>
          </button>
          <button
            type="button"
            @click="login()"
            class="flex-[3] bg-white/20 backdrop-blur text-white border border-white/30 font-bold py-4 rounded-2xl transition-transform active:scale-95 shadow-lg"
          >
            Accès Rapide (Démo)
          </button>
        </div>
      </form>
    </main>

    <!-- ==================== CONTENU PRINCIPAL DE L'APP ==================== -->
    <div
      x-show="currentPage !== 'login'"
      class="flex-1 flex flex-col h-full w-full max-w-md mx-auto relative shadow-2xl overflow-hidden bg-slate-100 dark:bg-slate-900"
      style="display: none"
      x-transition:enter="transition-all ease-out duration-300"
      x-transition:enter-start="opacity-0 translate-y-8 scale-95"
      x-transition:enter-end="opacity-100 translate-y-0 scale-100"
    >
      <!-- Header Décoratif avec Gradient (Visible Dashboard uniquement) -->
      <div
        class="absolute top-0 left-0 right-0 h-64 bg-ferme rounded-b-[2.5rem] z-0"
        x-show="currentPage === 'dashboard'"
        x-transition
      >
        <!-- Decorative circles -->
        <div
          class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl transform translate-x-10 -translate-y-10"
        ></div>
        <div
          class="absolute bottom-10 left-0 w-24 h-24 bg-black/10 rounded-full blur-xl transform -translate-x-5"
        ></div>
      </div>

      <!-- Header Global Compact -->
      <header
        class="pt-safe px-5 pb-3 flex justify-between items-center z-10 shrink-0 relative transition-colors"
        :class="currentPage === 'dashboard' ? 'text-white' : 'text-slate-800 dark:text-white bg-white dark:bg-slate-800 shadow-sm'"
      >
        <div>
          <h2
            class="text-sm font-semibold opacity-80"
            x-text="currentPage === 'dashboard' ? '👋 Bonjour, ' + user.name : 'Bienvenue'"
          ></h2>
          <h1
            class="text-2xl font-bold tracking-tight"
            x-text="getPageTitle()"
          ></h1>
        </div>
        <button
          @click="currentPage = 'alerts'"
          class="relative p-2 rounded-full cursor-pointer hover:bg-black/10 transition-colors"
        >
          <i data-lucide="bell" class="w-6 h-6"></i>
          <span
            x-show="unreadAlertsCount > 0"
            class="absolute top-1 right-2 bg-alerte text-white text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full border-2 border-transparent shadow-sm"
          >
            <span x-text="unreadAlertsCount"></span>
          </span>
        </button>
      </header>

      <!-- Dynamic Content Area -->
      <div class="flex-1 overflow-y-auto px-5 pb-28 pt-4 scroll-smooth z-10">
        <!-- pb-28 pour laisser la place au bottom nav -->

        <!-- ====== B. DASHBOARD ====== -->
        <div
          x-show="currentPage === 'dashboard'"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 translate-x-4"
          x-transition:enter-end="opacity-100 translate-x-0"
        >
          <!-- Status Banner -->
          <div
            class="mb-6 p-4 rounded-3xl backdrop-blur-md shadow-lg border-l-4 flex items-center gap-4 transition-all"
            :class="unreadAlertsCount > 0 ? 'border-alerte bg-white/95 dark:bg-slate-800/95' : 'border-emerald-400 bg-white dark:bg-slate-800'"
          >
            <div
              class="p-3 rounded-2xl"
              :class="unreadAlertsCount > 0 ? 'bg-red-100 text-alerte' : 'bg-emerald-100 text-ferme'"
            >
              <i
                :data-lucide="unreadAlertsCount > 0 ? 'alert-triangle' : 'check-circle'"
                class="w-6 h-6"
              ></i>
            </div>
            <div>
              <p
                class="font-bold text-lg text-slate-800 dark:text-white"
                x-text="unreadAlertsCount > 0 ? `Attention requise` : 'Tout est normal'"
              ></p>
              <p
                class="text-sm text-slate-500 font-medium"
                x-text="unreadAlertsCount > 0 ? `${unreadAlertsCount} nouvelle(s) alerte(s) à consulter.` : 'Vos capteurs sont fonctionnels.'"
              ></p>
            </div>
          </div>

          <div class="flex items-center justify-between mb-3 text-white">
            <h3 class="font-bold tracking-wide shadow-black/20 drop-shadow-md">
              Vue des Capteurs
            </h3>
            <div
              class="flex items-center gap-1 text-sm bg-black/20 px-3 py-1 rounded-full backdrop-blur-md"
            >
              <i data-lucide="sun" class="w-4 h-4 text-yellow-300"></i>
              <span class="font-semibold">22°C Ext.</span>
            </div>
          </div>

          <!-- Tuiles Grid -->
          <div class="grid grid-cols-2 gap-4">
            <template x-for="(sensor, key) in sensors" :key="key">
              <div
                @click="viewSensor(key)"
                class="glass-card p-5 rounded-[2rem] cursor-pointer hover:scale-[1.02] transition-transform flex flex-col justify-between aspect-square group"
              >
                <div class="flex justify-between items-start">
                  <div
                    class="w-10 h-10 rounded-2xl flex items-center justify-center mb-3 transition-colors"
                    :class="sensor.bg"
                  >
                    <i
                      :data-lucide="sensor.icon"
                      class="w-5 h-5"
                      :class="sensor.color"
                    ></i>
                  </div>
                  <i
                    data-lucide="chevron-right"
                    class="w-5 h-5 text-slate-300 group-hover:text-ferme transition-colors"
                  ></i>
                </div>
                <div>
                  <p
                    class="text-sm font-semibold text-slate-500 dark:text-slate-400"
                    x-text="sensor.name"
                  ></p>
                  <div class="flex items-end gap-1 mt-1">
                    <p
                      class="text-3xl font-extrabold text-slate-800 dark:text-white"
                    >
                      <span x-text="sensor.val"></span>
                    </p>
                    <p
                      class="text-lg font-bold text-slate-400 mb-0.5"
                      x-text="sensor.unit"
                    ></p>
                  </div>
                </div>
              </div>
            </template>

            <!-- Actionneur Pompe (Pleine largeur) -->
            <div
              class="col-span-2 glass-card p-5 rounded-[2rem] flex items-center justify-between mt-2"
            >
              <div class="flex items-center gap-4">
                <div
                  class="w-12 h-12 rounded-2xl flex items-center justify-center transition-colors"
                  :class="actuators.pump ? 'bg-blue-500 text-white shadow-lg shadow-blue-500/30' : 'bg-slate-100 dark:bg-slate-800 text-slate-400'"
                >
                  <i data-lucide="waves" class="w-6 h-6"></i>
                </div>
                <div>
                  <p
                    class="font-bold text-lg text-slate-800 dark:text-white transition-colors"
                    :class="actuators.pump ? 'text-blue-600 dark:text-blue-400' : ''"
                  >
                    Pompe Arrosage
                  </p>
                  <p
                    class="text-sm font-semibold transition-colors mt-0.5"
                    :class="actuators.pump ? 'text-blue-500' : 'text-slate-400'"
                    x-text="actuators.pump ? 'Activée en cours' : 'Actuellement à l\'arrêt'"
                  ></p>
                </div>
              </div>

              <!-- Toggle Custom Beau -->
              <div
                @click="togglePump()"
                class="w-16 h-8 flex items-center rounded-full p-1 cursor-pointer transition-colors duration-300 border-2"
                :class="actuators.pump ? 'bg-blue-500 border-blue-500' : 'bg-slate-200 dark:bg-slate-700 border-slate-200 dark:border-slate-700'"
              >
                <div
                  class="bg-white w-5 h-5 rounded-full shadow-sm toggle-spring"
                  :class="actuators.pump ? 'translate-x-8' : 'translate-x-0'"
                ></div>
              </div>
            </div>
          </div>
        </div>

        <!-- ====== C. PAGE ALERTES ====== -->
        <div
          x-show="currentPage === 'alerts'"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 translate-x-4"
          x-transition:enter-end="opacity-100 translate-x-0"
          class="pt-2"
        >
          <template x-if="alerts.length === 0">
            <div
              class="flex flex-col items-center justify-center mt-20 text-slate-400"
            >
              <div
                class="w-24 h-24 bg-slate-200 dark:bg-slate-800 rounded-full flex items-center justify-center mb-6"
              >
                <i data-lucide="check" class="w-12 h-12 text-slate-300"></i>
              </div>
              <p class="text-xl font-bold text-slate-600 dark:text-slate-300">
                C'est le calme absolu.
              </p>
              <p class="text-sm mt-2 text-center max-w-[80%]">
                Toutes les métriques de votre ferme sont dans les normes
                requises.
              </p>
            </div>
          </template>

          <div class="space-y-4">
            <template x-for="alerte in alerts" :key="alerte.id">
              <div
                class="glass-card p-5 rounded-[2rem] border-l-4"
                :class="alerte.type === 'critique' ? 'border-alerte' : 'border-warning', alerte.read ? 'opacity-60 grayscale' : 'shadow-lg'"
              >
                <div class="flex justify-between items-start mb-2">
                  <div class="flex items-center gap-3">
                    <div
                      class="p-2 rounded-xl"
                      :class="alerte.type === 'critique' ? 'bg-red-100 text-alerte' : 'bg-yellow-100 text-warning'"
                    >
                      <i
                        :data-lucide="alerte.type === 'critique' ? 'alert-triangle' : 'info'"
                        class="w-5 h-5"
                      ></i>
                    </div>
                    <div>
                      <h3
                        class="font-bold text-lg text-slate-800 dark:text-white"
                        :class="alerte.read ? 'line-through decoration-slate-400 text-slate-500' : ''"
                        x-text="alerte.title"
                      ></h3>
                      <p
                        class="text-xs text-slate-500 font-medium"
                        x-text="alerte.time"
                      ></p>
                    </div>
                  </div>
                </div>
                <p
                  class="text-sm text-slate-600 dark:text-slate-300 mt-2 mb-4 ml-12"
                  x-text="alerte.desc"
                ></p>

                <template x-if="!alerte.read">
                  <div class="flex gap-3 ml-12">
                    <button
                      @click="markAlertRead(alerte.id)"
                      class="flex-1 py-2.5 px-4 bg-slate-100 dark:bg-slate-800 font-bold rounded-xl text-slate-700 dark:text-slate-200 active:scale-95 transition-transform text-sm"
                    >
                      Masquer
                    </button>
                    <template x-if="alerte.action === 'pump_off'">
                      <button
                        @click="actuators.pump = false; markAlertRead(alerte.id); showToast('Pompe désactivée d\'urgence')"
                        class="flex-[2] py-2.5 px-4 bg-alerte text-white font-bold rounded-xl active:scale-95 transition-transform shadow-lg shadow-red-500/30 text-sm"
                      >
                        Couper Pompe
                      </button>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>

        <!-- ====== D. PAGE DÉTAIL ====== -->
        <div
          x-show="currentPage === 'detail'"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 translate-x-4"
          x-transition:enter-end="opacity-100 translate-x-0"
          class="pt-2"
        >
          <template x-if="selectedSensor">
            <div class="space-y-6">
              <!-- Valeur Principale -->
              <div
                class="glass-card p-8 rounded-[2.5rem] text-center relative overflow-hidden"
              >
                <!-- Soft glow background -->
                <div
                  class="absolute inset-0 opacity-20 transition-colors"
                  :class="selectedSensor.bg"
                ></div>

                <div class="relative z-10">
                  <div
                    class="w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4 transition-colors shadow-sm"
                    :class="selectedSensor.bg"
                  >
                    <i
                      :data-lucide="selectedSensor.icon"
                      class="w-8 h-8"
                      :class="selectedSensor.color"
                    ></i>
                  </div>
                  <h2
                    class="text-xl font-bold text-slate-500 dark:text-slate-400 mb-1"
                    x-text="selectedSensor.name"
                  ></h2>

                  <div class="flex items-end justify-center gap-1 my-6">
                    <span
                      class="text-7xl font-black text-slate-800 dark:text-white"
                      x-text="selectedSensor.val"
                    ></span>
                    <span
                      class="text-3xl font-bold text-slate-400 mb-2"
                      x-text="selectedSensor.unit"
                    ></span>
                  </div>

                  <div
                    class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-slate-100 dark:bg-slate-800 text-sm font-bold text-emerald-600 dark:text-emerald-400"
                  >
                    <i data-lucide="activity" class="w-4 h-4"></i> Statut
                    Optimal
                  </div>
                </div>
              </div>

              <!-- Graphique -->
              <div class="glass-card p-6 rounded-[2rem]">
                <h3
                  class="font-bold text-lg mb-6 text-slate-800 dark:text-white"
                >
                  Historique 7 Jours
                </h3>

                <!-- Graphique à barres pur HTML/Tailwind -->
                <div class="flex items-end justify-between h-40 gap-2 mb-4">
                  <template
                    x-for="(h, index) in selectedSensor.history"
                    :key="index"
                  >
                    <div
                      class="w-full flex flex-col justify-end h-full relative group"
                    >
                      <!-- Tooltip (visible on hover/active) -->
                      <div
                        class="absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs font-bold py-1 px-2 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-10 pointer-events-none"
                      >
                        <span x-text="h"></span
                        ><span x-text="selectedSensor.unit"></span>
                      </div>
                      <div
                        class="w-full rounded-t-xl transition-all duration-700 hover:opacity-80 cursor-pointer"
                        :class="selectedSensor.bg"
                        :style="`height: ${Math.min(h, 100)}%; opacity: ${index === selectedSensor.history.length - 1 ? '1' : '0.6'}`"
                      ></div>
                    </div>
                  </template>
                </div>

                <div
                  class="flex justify-between text-xs font-bold text-slate-400"
                >
                  <span>Lun</span><span>Mar</span><span>Mer</span
                  ><span>Jeu</span><span>Ven</span><span>Sam</span
                  ><span class="text-slate-800 dark:text-white">Auj</span>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- ====== E. PAGE PARAMÈTRES ====== -->
        <div
          x-show="currentPage === 'settings'"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 translate-x-4"
          x-transition:enter-end="opacity-100 translate-x-0"
          class="pt-2"
        >
          <h3
            class="font-bold text-slate-500 ml-2 mb-3 uppercase tracking-wider text-sm"
          >
            Préférences
          </h3>

          <div class="glass-card rounded-[2rem] overflow-hidden mb-6">
            <div
              class="p-5 flex justify-between items-center bg-white/50 dark:bg-slate-800/50"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-10 h-10 rounded-xl bg-ferme/10 text-ferme flex items-center justify-center"
                >
                  <i data-lucide="bell-ring" class="w-5 h-5"></i>
                </div>
                <div>
                  <h3 class="font-bold text-slate-800 dark:text-white text-lg">
                    Notifications
                  </h3>
                  <p class="text-xs text-slate-500 font-medium">
                    Alertes Push sur téléphone
                  </p>
                </div>
              </div>
              <div
                @click="settings.notifications = !settings.notifications; saveSettings()"
                class="w-14 h-7 flex items-center rounded-full p-1 cursor-pointer transition-colors duration-300 border-2"
                :class="settings.notifications ? 'bg-ferme border-ferme' : 'bg-slate-200 dark:bg-slate-700 border-slate-200 dark:border-slate-700'"
              >
                <div
                  class="bg-white w-5 h-5 rounded-full shadow-sm toggle-spring"
                  :class="settings.notifications ? 'translate-x-7' : 'translate-x-0'"
                ></div>
              </div>
            </div>
          </div>

          <h3
            class="font-bold text-slate-500 ml-2 mb-3 uppercase tracking-wider text-sm"
          >
            Seuils d'alertes locales
          </h3>

          <div class="glass-card rounded-[2rem] overflow-hidden mb-8">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800">
              <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                  <i data-lucide="thermometer" class="w-5 h-5 text-alerte"></i>
                  <span class="font-bold text-slate-800 dark:text-white"
                    >Température Max</span
                  >
                </div>
                <span
                  class="font-black text-xl text-alerte block"
                  x-text="settings.maxTemp + ' °C'"
                ></span>
              </div>
              <input
                type="range"
                min="15"
                max="50"
                x-model="settings.maxTemp"
                @change="saveSettings()"
                class="w-full accent-alerte h-3 bg-slate-200 dark:bg-slate-700 rounded-full appearance-none cursor-pointer"
              />
            </div>

            <div class="p-6 bg-white/50 dark:bg-slate-800/50">
              <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                  <i data-lucide="droplets" class="w-5 h-5 text-blue-500"></i>
                  <span class="font-bold text-slate-800 dark:text-white"
                    >Niveau Eau Min</span
                  >
                </div>
                <span
                  class="font-black text-xl text-blue-500"
                  x-text="settings.minWater + ' %'"
                ></span>
              </div>
              <input
                type="range"
                min="0"
                max="50"
                x-model="settings.minWater"
                @change="saveSettings()"
                class="w-full accent-blue-500 h-3 bg-slate-200 dark:bg-slate-700 rounded-full appearance-none cursor-pointer"
              />
            </div>
          </div>

          <button
            @click="logout()"
            class="w-full py-5 rounded-[2rem] font-bold text-red-500 bg-red-50 hover:bg-red-100 dark:bg-red-500/10 dark:hover:bg-red-500/20 transition-colors flex justify-center items-center gap-2 active:scale-95 duration-200"
          >
            <i data-lucide="log-out" class="w-5 h-5"></i> Se déconnecter
          </button>
        </div>
      </div>

      <!-- ==================== NAVIGATION BOTTOM BAR ==================== -->
      <nav
        class="absolute bottom-0 w-full z-50 glass pb-safe rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.05)] border-t border-white/20"
      >
        <ul class="flex justify-around items-center pt-3 px-2">
          <li
            @click="currentPage = 'dashboard'"
            class="flex flex-col items-center gap-1.5 cursor-pointer w-16 relative"
          >
            <div
              class="flex items-center justify-center transition-all duration-300 transform"
              :class="currentPage === 'dashboard' ? '-translate-y-2' : ''"
            >
              <div
                class="absolute inset-0 bg-ferme rounded-2xl opacity-20 scale-150 transition-transform duration-300"
                x-show="currentPage === 'dashboard'"
                x-transition
              ></div>
              <i
                data-lucide="layout-grid"
                class="w-6 h-6 transition-colors duration-300 relative z-10"
                :class="currentPage === 'dashboard' ? 'text-ferme fill-ferme/20' : 'text-slate-400'"
              ></i>
            </div>
            <span
              class="text-[11px] font-bold transition-colors duration-300"
              :class="currentPage === 'dashboard' ? 'text-ferme' : 'text-slate-400'"
              >Vue</span
            >
            <div
              class="absolute -bottom-3 w-1.5 h-1.5 rounded-full bg-ferme"
              x-show="currentPage === 'dashboard'"
            ></div>
          </li>

          <li
            @click="currentPage = 'alerts'"
            class="flex flex-col items-center gap-1.5 cursor-pointer w-16 relative"
          >
            <div
              class="flex items-center justify-center transition-all duration-300 transform"
              :class="currentPage === 'alerts' ? '-translate-y-2' : ''"
            >
              <div
                class="absolute inset-0 bg-ferme rounded-2xl opacity-20 scale-150 transition-transform duration-300"
                x-show="currentPage === 'alerts'"
                x-transition
              ></div>
              <i
                data-lucide="bell"
                class="w-6 h-6 transition-colors duration-300 relative z-10"
                :class="currentPage === 'alerts' ? 'text-ferme fill-ferme/20' : 'text-slate-400'"
              ></i>
              <span
                x-show="unreadAlertsCount > 0"
                class="absolute -top-1 -right-1.5 bg-alerte border-2 border-white text-white text-[9px] font-bold w-4 h-4 flex items-center justify-center rounded-full z-20"
              ></span>
            </div>
            <span
              class="text-[11px] font-bold transition-colors duration-300"
              :class="currentPage === 'alerts' ? 'text-ferme' : 'text-slate-400'"
              >Alertes</span
            >
            <div
              class="absolute -bottom-3 w-1.5 h-1.5 rounded-full bg-ferme"
              x-show="currentPage === 'alerts'"
            ></div>
          </li>

          <li
            @click="viewSensor('temp')"
            class="flex flex-col items-center gap-1.5 cursor-pointer w-16 relative"
          >
            <div
              class="flex items-center justify-center transition-all duration-300 transform"
              :class="currentPage === 'detail' ? '-translate-y-2' : ''"
            >
              <div
                class="absolute inset-0 bg-ferme rounded-2xl opacity-20 scale-150 transition-transform duration-300"
                x-show="currentPage === 'detail'"
                x-transition
              ></div>
              <i
                data-lucide="tractor"
                class="w-6 h-6 transition-colors duration-300 relative z-10"
                :class="currentPage === 'detail' ? 'text-ferme fill-ferme/20' : 'text-slate-400'"
              ></i>
            </div>
            <span
              class="text-[11px] font-bold transition-colors duration-300"
              :class="currentPage === 'detail' ? 'text-ferme' : 'text-slate-400'"
              >Détail</span
            >
            <div
              class="absolute -bottom-3 w-1.5 h-1.5 rounded-full bg-ferme"
              x-show="currentPage === 'detail'"
            ></div>
          </li>

          <li
            @click="currentPage = 'settings'"
            class="flex flex-col items-center gap-1.5 cursor-pointer w-16 relative"
          >
            <div
              class="flex items-center justify-center transition-all duration-300 transform"
              :class="currentPage === 'settings' ? '-translate-y-2' : ''"
            >
              <div
                class="absolute inset-0 bg-ferme rounded-2xl opacity-20 scale-150 transition-transform duration-300"
                x-show="currentPage === 'settings'"
                x-transition
              ></div>
              <i
                data-lucide="settings-2"
                class="w-6 h-6 transition-colors duration-300 relative z-10"
                :class="currentPage === 'settings' ? 'text-ferme fill-ferme/20' : 'text-slate-400'"
              ></i>
            </div>
            <span
              class="text-[11px] font-bold transition-colors duration-300"
              :class="currentPage === 'settings' ? 'text-ferme' : 'text-slate-400'"
              >Réglages</span
            >
            <div
              class="absolute -bottom-3 w-1.5 h-1.5 rounded-full bg-ferme"
              x-show="currentPage === 'settings'"
            ></div>
          </li>
        </ul>
      </nav>
    </div>
  </body>
</html>
