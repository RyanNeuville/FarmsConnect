<!doctype html>
<html lang="fr" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>FarmsConnect - Équipements</title>

    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icon.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="css/app.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              green: { 500: "#22c55e", 600: "#16a34a" },
              slate: {
                50: "#f8fafc",
                100: "#f1f5f9",
                400: "#94a3b8",
                500: "#64748b",
                800: "#1e293b",
              },
            },
            fontFamily: { sans: ["Nunito", "sans-serif"] },
          },
        },
      };
    </script>
  </head>
  <body class="flex flex-col h-[100dvh] overflow-hidden bg-[#fafbfd]">
    <main class="flex-1 overflow-y-auto px-4 pb-24 pt-safe">
      <!-- HEADER -->
      <header class="flex items-center gap-3 mt-4 mb-6">
        <div
          class="w-12 h-12 bg-brand-green-light rounded-2xl flex items-center justify-center text-green-600"
        >
          <i data-lucide="tractor" class="w-6 h-6"></i>
        </div>
        <div>
          <h1 class="text-[1.3rem] font-black text-[#0f2b46] leading-tight">
            Équipements
          </h1>
          <p class="text-xs text-slate-400 font-bold">
            6 capteurs / actionneurs
          </p>
        </div>
      </header>

      <!-- Status Banner -->
      <div
        class="bg-brand-green-light rounded-xl p-3 mb-6 flex items-center gap-2"
      >
        <i data-lucide="wifi" class="w-4 h-4 text-green-600"></i>
        <span class="font-bold text-green-600 text-[13px]"
          >Connecté – données en temps réel</span
        >
      </div>

      <!-- LIST -->
      <div class="space-y-3">
        <!-- Item 1 -->
        <a
          href="detail.html"
          class="card-border p-3 flex items-center justify-between block active:bg-slate-50 transition-colors"
        >
          <div class="flex items-center gap-4">
            <div class="icon-box green">
              <i data-lucide="thermometer" class="w-5 h-5"></i>
            </div>
            <div>
              <h3 class="text-sm font-bold text-slate-800 mb-1">Serre 1</h3>
              <div class="flex items-center gap-2">
                <span
                  class="pill green"
                  style="padding: 2px 6px; font-size: 10px"
                  ><span class="status-dot green"></span> Normal</span
                >
                <span class="text-xs font-bold text-slate-500">19.4°C</span>
              </div>
            </div>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </a>

        <!-- Item 2 -->
        <a
          href="detail.html"
          class="card-border p-3 flex items-center justify-between block active:bg-slate-50 transition-colors"
        >
          <div class="flex items-center gap-4">
            <div class="icon-box green">
              <i data-lucide="droplets" class="w-5 h-5"></i>
            </div>
            <div>
              <h3 class="text-sm font-bold text-slate-800 mb-1">
                Humidité sol
              </h3>
              <div class="flex items-center gap-2">
                <span
                  class="pill green"
                  style="padding: 2px 6px; font-size: 10px"
                  ><span class="status-dot green"></span> Normal</span
                >
                <span class="text-xs font-bold text-slate-500">67.9%</span>
              </div>
            </div>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </a>

        <!-- Item 3 -->
        <a
          href="detail.html"
          class="card-border p-3 flex items-center justify-between block active:bg-slate-50 transition-colors"
        >
          <div class="flex items-center gap-4">
            <div class="icon-box green">
              <i data-lucide="droplet" class="w-5 h-5"></i>
            </div>
            <div>
              <h3 class="text-sm font-bold text-slate-800 mb-1">
                Réservoir eau
              </h3>
              <div class="flex items-center gap-2">
                <span
                  class="pill green"
                  style="padding: 2px 6px; font-size: 10px"
                  ><span class="status-dot green"></span> Normal</span
                >
                <span class="text-xs font-bold text-slate-500">70.7%</span>
              </div>
            </div>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </a>

        <!-- Item 4 -->
        <a
          href="detail.html"
          class="card-border p-3 flex items-center justify-between block active:bg-slate-50 transition-colors"
        >
          <div class="flex items-center gap-4">
            <div class="icon-box green">
              <i data-lucide="battery-medium" class="w-5 h-5"></i>
            </div>
            <div>
              <h3 class="text-sm font-bold text-slate-800 mb-1">
                Batterie Nord
              </h3>
              <div class="flex items-center gap-2">
                <span
                  class="pill green"
                  style="padding: 2px 6px; font-size: 10px"
                  ><span class="status-dot green"></span> Normal</span
                >
                <span class="text-xs font-bold text-slate-500">87.6%</span>
              </div>
            </div>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </a>

        <!-- Item 5 -->
        <a
          href="actionneur.html"
          class="card-border p-3 flex items-center justify-between block active:bg-slate-50 transition-colors"
        >
          <div class="flex items-center gap-4">
            <div class="icon-box bg-slate-100 text-slate-500">
              <i data-lucide="power" class="w-5 h-5"></i>
            </div>
            <div>
              <h3 class="text-sm font-bold text-slate-800 mb-1">
                Pompe arrosage
              </h3>
              <div class="flex items-center gap-2">
                <span
                  class="pill grey"
                  style="padding: 2px 6px; font-size: 10px"
                  ><span class="status-dot grey"></span> Arrêté</span
                >
                <span
                  class="text-[10px] font-bold text-slate-400 flex items-center gap-1"
                >
                  <span
                    class="w-1.5 h-1.5 rounded-full border border-slate-300 block"
                  ></span>
                  Arrêt
                </span>
              </div>
            </div>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </a>

        <!-- Item 6 -->
        <a
          href="actionneur.html"
          class="card-border p-3 flex items-center justify-between block active:bg-slate-50 transition-colors"
        >
          <div class="flex items-center gap-4">
            <div class="icon-box bg-slate-100 text-slate-500">
              <i data-lucide="flame" class="w-5 h-5"></i>
            </div>
            <div>
              <h3 class="text-sm font-bold text-slate-800 mb-1">
                Chauffage serre
              </h3>
              <div class="flex items-center gap-2">
                <span
                  class="pill grey"
                  style="padding: 2px 6px; font-size: 10px"
                  ><span class="status-dot grey"></span> Arrêté</span
                >
                <span
                  class="text-[10px] font-bold text-slate-400 flex items-center gap-1"
                >
                  <span
                    class="w-1.5 h-1.5 rounded-full border border-slate-300 block"
                  ></span>
                  Arrêt
                </span>
              </div>
            </div>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </a>
      </div>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="absolute bottom-0 w-full bottom-nav pt-3 pb-safe z-50">
      <ul class="flex justify-around items-center px-2">
        <li>
          <a href="index.html" class="nav-item w-16">
            <div class="p-1.5 flex items-center justify-center">
              <i data-lucide="home" class="w-5 h-5"></i>
            </div>
            <span>Accueil</span>
          </a>
        </li>
        <li>
          <a href="alertes.html" class="nav-item w-16">
            <div class="p-1.5 flex items-center justify-center">
              <i data-lucide="bell" class="w-5 h-5"></i>
            </div>
            <span>Alertes</span>
          </a>
        </li>
        <li>
          <a href="equipements.html" class="nav-item active w-16">
            <div
              class="bg-brand-green-light rounded-xl p-1.5 flex items-center justify-center"
            >
              <i data-lucide="tractor" class="w-5 h-5 text-green-500"></i>
            </div>
            <span>Équipements</span>
          </a>
        </li>
        <li>
          <a href="reglages.html" class="nav-item w-16">
            <div class="p-1.5 flex items-center justify-center">
              <i data-lucide="settings" class="w-5 h-5"></i>
            </div>
            <span>Réglages</span>
          </a>
        </li>
      </ul>
    </nav>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
